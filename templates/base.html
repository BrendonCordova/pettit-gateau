<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pettit Gateau{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Pettit Gateau</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Perfumes</a>
                    </li>
                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="/carrinho/">
                            Carrinho 
                            <span id="cart-item-count" class="badge bg-danger rounded-pill">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="text-center mt-5 p-4 text-muted border-top">
        <small>&copy; 2026 Pettit Gateau. Todos os direitos reservados.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        async function updateCartCounter() {
            try {
                const response = await fetch('/carrinho/api/my-cart/');
                if (response.ok) {
                    const cart = await response.json();
            
                    const totalItems = cart.items.reduce((sum, item) => sum + item.quantity, 0);
                    
                    const counterElement = document.getElementById('cart-item-count');
                    if (counterElement) {
                        counterElement.innerText = totalItems;
                    }
                }
            } catch (error) {
                console.error("Erro ao buscar o contador do carrinho:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', updateCartCounter);
    </script>

    {% block scripts %}{% endblock %}
