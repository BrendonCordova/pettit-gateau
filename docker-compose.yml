version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pettit_gateau_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=pettit_gateau
      - POSTGRES_USER=brendon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

volumes:
  postgres_data: